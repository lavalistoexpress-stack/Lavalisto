<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LavaListo Express</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:#f5fbff;
color:#0d2b6b;
overflow-x:hidden;
}

section{
padding:90px 20px;
position:relative;
}

.container{
max-width:1350px;
margin:auto;
}
/* NAVBAR */

nav{
position:fixed;
top:0;
left:0;
width:100%;
padding:18px 6%;
display:flex;
justify-content:space-between;
align-items:center;
z-index:9999;
background:rgba(0,0,0,0.15);
backdrop-filter:blur(14px);
}

.logo{
font-size:34px;
font-weight:800;
color:white;
}

.logo span{
color:#ffe600;
}

nav ul{
display:flex;
gap:30px;
list-style:none;
}

nav a{
text-decoration:none;
color:white;
font-weight:600;
transition:.3s;
}

nav a:hover{
color:#ffe600;
}
/* HERO */
font-size:68px;
line-height:1.05;
margin-bottom:24px;
}

.hero-content p{
font-size:18px;
line-height:1.9;
margin-bottom:30px;
}

.hero-buttons{
display:flex;
gap:18px;
flex-wrap:wrap;
margin-bottom:30px;
}

.btn{
padding:18px 34px;
border-radius:60px;
text-decoration:none;
font-weight:700;
transition:.35s;
}

.btn-primary{
background:#ffe600;
color:#003cff;
}

.btn-primary:hover{
transform:translateY(-5px) scale(1.03);
}

.btn-secondary{
border:2px solid rgba(255,255,255,0.4);
color:white;
}

.btn-secondary:hover{
background:white;
color:#003cff;
}

.hero-stats{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.stat{
background:rgba(255,255,255,0.10);
padding:18px;
border-radius:22px;
text-align:center;
transition:.35s;
}

.stat:hover{
transform:translateY(-6px);
background:rgba(255,255,255,0.18);
}
/* TITLES */
.card:hover::before{
left:130%;
}

.card:hover{
transform:translateY(-14px) rotateX(4deg);
box-shadow:0 30px 70px rgba(0,0,0,0.14);
}

.card-icon{
font-size:52px;
margin-bottom:20px;
}

.card h3{
font-size:32px;
margin-bottom:18px;
color:#003cff;
}

.card p{
line-height:1.9;
color:#61708f;
margin-bottom:18px;
}

.card ul{
padding-left:20px;
line-height:2;
color:#61708f;
}

.price{
margin-top:24px;
font-size:42px;
font-weight:800;
color:#00b894;
}

/* PREMIUM PLANS */
top:-150px;
filter:blur(10px);
}

.business .title,
.business .subtitle{
color:white;
}

.business-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:28px;
margin-top:50px;
}

.business-card{
background:rgba(255,255,255,0.10);
padding:35px;
border-radius:35px;
backdrop-filter:blur(10px);
transition:.4s;
border:1px solid rgba(255,255,255,0.12);
}

.business-card:hover{
transform:translateY(-10px);
background:rgba(255,255,255,0.18);
}

.business-card h3{
font-size:28px;
margin:18px 0;
}

.business-card ul{
padding-left:20px;
line-height:2;
}

.business-icon{
font-size:48px;
}
/* BENEFITS */

.benefits-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:22px;
margin-top:45px;
}

.benefit-box{
background:rgba(255,255,255,0.12);
padding:28px;
border-radius:28px;
backdrop-filter:blur(10px);
transition:.35s;
}

.benefit-box:hover{
transform:translateY(-8px);
}

/* TABLES */

.tables{
background:white;
}

.table-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:30px;
}

.table-card{
background:#fff;
border-radius:35px;
overflow:hidden;
box-shadow:0 18px 45px rgba(0,0,0,0.08);
}

.table-header{
background:linear-gradient(135deg,#003cff,#00cfff);
padding:28px;
color:white;
font-size:28px;
font-weight:700;
}

.row{
display:flex;
justify-content:space-between;
gap:20px;
padding:18px 24px;
border-bottom:1px solid #edf3ff;
}

.row span:last-child{
font-weight:700;
color:#003cff;
}
/* CTA */
}

textarea{
grid-column:1/3;
resize:none;
}

.submit-btn{
margin-top:24px;
width:100%;
padding:22px;
border:none;
border-radius:22px;
background:linear-gradient(135deg,#003cff,#00cfff);
color:white;
font-size:18px;
font-weight:700;
cursor:pointer;
transition:.35s;
}

.submit-btn:hover{
transform:translateY(-5px);
}

/* FOOTER */

footer{
background:#002c8f;
color:white;
text-align:center;
padding:70px 20px;
}

footer h2{
font-size:40px;
margin-bottom:15px;
}

.whatsapp{
position:fixed;
right:20px;
bottom:20px;
background:#25D366;
color:white;
padding:18px 28px;
border-radius:60px;
text-decoration:none;
font-weight:700;
box-shadow:0 15px 35px rgba(0,0,0,0.24);
z-index:9999;
}
/* RESPONSIVE */
<option>Plan Mensual</option>
</select>

<textarea id="mensaje" rows="5" placeholder="Observaciones adicionales"></textarea>

</div>

<button class="submit-btn" type="submit">
Enviar Solicitud
</button>

</form>

</div>

</div>
</section>

<footer>
<h2>LavaListo Express</h2>
<p>Bogotá • Servicio a domicilio</p>
<p>WhatsApp: 3166977616</p>
</footer>

</a>

<script>

document.getElementById('pickupForm')
.addEventListener('submit', function(e){

e.preventDefault();

const nombre = document.getElementById('nombre').value;
const telefono = document.getElementById('telefono').value;
const direccion = document.getElementById('direccion').value;
const servicio = document.getElementById('servicio').value;
const mensaje = document.getElementById('mensaje').value;

const texto = encodeURIComponent(
`Hola LavaListo Express,

Quiero solicitar recogida.

Nombre: ${nombre}

Teléfono: ${telefono}

Dirección: ${direccion}

Servicio solicitado: ${servicio}

Observaciones: ${mensaje}`
);

window.open(
`https://wa.me/573166977616?text=${texto}`,
'_blank'
);

});

</script>

</body>
</html>
