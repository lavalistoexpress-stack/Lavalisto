nav a{
text-decoration:none;
color:white;
font-weight:600;
transition:.3s;
}

nav a:hover{

/* HERO */

.hero{
min-height:100vh;
display:flex;
align-items:center;
background:
radial-gradient(circle at top left, rgba(255,255,255,0.12), transparent 25%),
linear-gradient(135deg,#003cff 0%,#008cff 50%,#00d9ff 100%);
overflow:hidden;
padding-top:120px;
}

.hero-grid{
display:grid;
grid-template-columns:1.1fr 1fr;
gap:50px;
align-items:center;
}

.hero-image{
position:relative;
}

.hero-image::before{
content:'';
position:absolute;
inset:-40px;
background:rgba(255,255,255,0.12);
filter:blur(40px);
border-radius:50%;
}

.hero-image img{
width:100%;
max-width:680px;
border-radius:40px;
position:relative;
box-shadow:0 35px 80px rgba(0,0,0,0.28);
animation:float 5s ease-in-out infinite;
}

@keyframes float{
50%{transform:translateY(-12px);}
}
.hero-content{
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;
}

.plan-card{
background:linear-gradient(145deg,white,#f6fbff);
padding:40px;
border-radius:38px;
position:relative;
overflow:hidden;
transition:.4s;
box-shadow:0 22px 50px rgba(0,0,0,0.08);
}

.plan-card:hover{
transform:translateY(-12px);
}

.plan-badge{
position:absolute;
top:18px;
right:18px;
background:#ffe600;
padding:10px 18px;
border-radius:50px;
font-size:12px;
font-weight:800;
color:#003cff;
}

.plan-card h3{
font-size:30px;
margin-bottom:18px;
color:#003cff;
}

.plan-price{
font-size:48px;
font-weight:800;
color:#00b894;
margin-bottom:20px;
}

.plan-card ul{
padding-left:20px;
line-height:2;
color:#61708f;
}
/* BUSINESS */
.submit-btn{
margin-top:24px;
width:100%;
padding:22px;
border:none;
border-radius:22px;
background:linear-gradient(135deg,#003cff,#00cfff);
color:white;
font-size:18px;
font-weight:700;
cursor:pointer;
transition:.35s;
}

.submit-btn:hover{
transform:translateY(-5px);
}

/* FOOTER */

footer{
